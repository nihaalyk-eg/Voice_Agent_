services:
  postgres:
    image: postgres:16-alpine
    container_name: voice_agent_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: voice_agent
      POSTGRES_USER: voice_agent
      POSTGRES_PASSWORD: voice_agent_pw
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voice_agent -d voice_agent']
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: voice_agent_valkey
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    container_name: voice_agent_livekit
    restart: unless-stopped
    ports:
      - '7880:7880'
      - '7881:7881'
      - '45000-45100:45000-45100/udp'
    depends_on:
      valkey:
        condition: service_healthy
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    command:
      - --dev
      - --redis-host=valkey:6379
      - --udp-port=45000-45100
      - --node-ip=127.0.0.1

  voice-ui:
    build:
      context: ./voice_agent
    container_name: voice_agent_ui
    restart: unless-stopped
    ports:
      - '8080:8080'
    env_file: .env
    environment:
      LIVEKIT_URL: ws://livekit:7880
    volumes:
      - voice_bench:/app/data
    depends_on:
      livekit:
        condition: service_started
      valkey:
        condition: service_healthy

volumes:
  pgdata:
  valkeydata:
  voice_bench:
