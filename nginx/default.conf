server {
    listen 80;

    # LiveKit WebSocket
    location /livekit/ {
        proxy_pass http://livekit:7880/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Voice agent SSE — must not buffer
    location /voice-api/stream {
        proxy_pass http://voice-agent:8080/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Voice agent API (token, agents, start/stop, bench)
    location /voice-api/ {
        proxy_pass http://voice-agent:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Email agent API
    location /api/ {
        proxy_pass http://email-agent:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Static assets (JS/CSS chunks) for Email Agent
    location /assets/ {
        proxy_pass http://email-agent:3001/assets/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Static assets for Voice Agent
    location /voice/assets/ {
        proxy_pass http://voice-agent:8080/voice/assets/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Voice Agent App Route
    location ~ ^/voice(/.*)?$ {
        rewrite ^.*$ /voice break;
        proxy_pass http://voice-agent:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Email Agent App Routes
    location ~ ^/(email|work-orders|communications|customers|observability)(/.*)?$ {
        rewrite ^.*$ /email break;
        proxy_pass http://email-agent:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Root — redirect to SPA
    location = / {
        return 302 /email;
    }
}
