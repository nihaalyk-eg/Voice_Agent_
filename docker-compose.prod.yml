version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: voice_agent_postgres_prod
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: voice_agent
      POSTGRES_USER: voice_agent
      POSTGRES_PASSWORD: voice_agent_pw
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voice_agent -d voice_agent']
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          memory: 256M

  valkey:
    image: valkey/valkey:8-alpine
    container_name: voice_agent_valkey_prod
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - valkeydata_prod:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 128M

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voice_agent_app_prod
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://voice_agent:voice_agent_pw@postgres:5432/voice_agent
      - VALKEY_URL=redis://valkey:6379
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          memory: 256M

volumes:
  pgdata_prod:
  valkeydata_prod:
