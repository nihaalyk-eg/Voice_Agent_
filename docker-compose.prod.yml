version: '3.9'

services:
  # ── Infrastructure ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: voice_agent_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: voice_agent
      POSTGRES_USER: voice_agent
      POSTGRES_PASSWORD: voice_agent_pw
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voice_agent']
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: voice_agent_valkey_prod
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - valkeydata_prod:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit_server
    restart: unless-stopped
    network_mode: host
    command: --config /etc/livekit.yaml --node-ip 18.198.144.82
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml

  # ── Voice agent ──────────────────────────────────────────────────────────────
  voice-agent:
    build:
      context: ./voice_agent
    container_name: voice_agent_service
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - voice_bench:/app/data
    extra_hosts:
      - 'livekit:host-gateway'

  # ── Email agent ───────────────────────────────────────────────────────────────
  email-agent:
    build:
      context: ./email_agent_app
    container_name: email_agent_service
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: '3001'
      DATABASE_URL: 'postgresql://voice_agent:voice_agent_pw@postgres:5432/voice_agent'
      VALKEY_URL: 'redis://valkey:6379'
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  # ── Nginx (entry point) ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: voice_nginx
    restart: unless-stopped
    ports:
      - '3000:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - voice-agent
      - email-agent
    extra_hosts:
      - 'livekit:host-gateway'

volumes:
  pgdata_prod:
  valkeydata_prod:
  voice_bench:
