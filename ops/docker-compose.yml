services:
  postgres:
    image: postgres:16-alpine
    container_name: voice_agent_postgres
    restart: unless-stopped
    ports:
      - '55432:5432'
    environment:
      POSTGRES_USER: voice_agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: voice_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./seed/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voice_agent -d voice_agent']
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: voice_agent_valkey
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5


  voice-ui:
    build:
      context: ..
      dockerfile: ops/Dockerfile
    container_name: voice_agent_ui
    restart: unless-stopped
    ports:
      - '3000:8080'
    env_file: ../.env
    environment:
      DATABASE_URL: 'postgresql://voice_agent:${POSTGRES_PASSWORD:-postgres}@postgres:5432/voice_agent'
    volumes:
      - voice_bench:/app/data
    depends_on:
      valkey:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  valkeydata:
  voice_bench:
